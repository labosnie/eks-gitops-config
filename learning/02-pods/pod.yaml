apiVersion: v1
kind: Pod

metadata:
  name: hello-pod
  namespace: incident-platform

  labels:
    app.kubernetes.io/name: hello
    app.kubernetes.io/part-of: incident-platform
    environment: local

spec:
  # Évite que Kubernetes injecte automatiquement
  # le token du ServiceAccount dans ce Pod.
  automountServiceAccountToken: false

  securityContext:
    # Utilise le profil de sécurité Linux par défaut.
    seccompProfile:
      type: RuntimeDefault

  containers:
    - name: web
      image: busybox:1.36.1

      # Crée une page HTML dans /tmp puis démarre
      # un petit serveur HTTP sur le port 8080.
      command:
        - sh
        - -c
        - |
          echo "Bonjour depuis Kubernetes" > /tmp/index.html
          httpd -f -p 8080 -h /tmp

      ports:
        - name: http
          containerPort: 8080

      securityContext:
        # Le conteneur ne doit pas fonctionner comme root.
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000

        # Empêche le processus d'obtenir davantage de privilèges.
        allowPrivilegeEscalation: false

        # Retire toutes les capacités Linux supplémentaires.
        capabilities:
          drop:
            - ALL

        # Rend le système de fichiers principal non modifiable.
        readOnlyRootFilesystem: true

      readinessProbe:
        httpGet:
          path: /
          port: http
        initialDelaySeconds: 2
        periodSeconds: 5

      livenessProbe:
        httpGet:
          path: /
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10

      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 64Mi

      volumeMounts:
        - name: temporary-files
          mountPath: /tmp

  volumes:
    - name: temporary-files
      emptyDir: {}

  restartPolicy: Always
