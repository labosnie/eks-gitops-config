apiVersion: apps/v1
kind: Deployment

metadata:
  name: hello-deployment
  namespace: incident-platform

  labels:
    app.kubernetes.io/name: hello
    app.kubernetes.io/part-of: incident-platform
    environment: local

spec:
  # Nombre de Pods que Kubernetes doit maintenir en fonctionnement.
  replicas: 2

  # Le Deployment reconnaît ses Pods grâce à ces labels.
  selector:
    matchLabels:
      app.kubernetes.io/name: hello
      app.kubernetes.io/instance: hello-local

  # Stratégie utilisée lors des changements de version.
  strategy:
    type: RollingUpdate

    rollingUpdate:
      # Aucun Pod existant ne doit être indisponible pendant la mise à jour.
      maxUnavailable: 0

      # Kubernetes peut créer temporairement un Pod supplémentaire.
      maxSurge: 1

  # Modèle utilisé pour créer chaque Pod.
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hello
        app.kubernetes.io/instance: hello-local
        app.kubernetes.io/part-of: incident-platform
        environment: local

    spec:
      automountServiceAccountToken: false

      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: web

          # L'image est verrouillée avec son digest pour garantir
          # que Kubernetes utilise toujours exactement la même image.
          image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          imagePullPolicy: IfNotPresent

          command:
            - sh
            - -c
            - |
              echo "Bonjour depuis un Deployment Kubernetes" > /tmp/index.html
              httpd -f -p 8080 -h /tmp

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

            capabilities:
              drop:
                - ALL

          readinessProbe:
            httpGet:
              path: /
              port: http

            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: http

            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3

          resources:
            requests:
              cpu: 10m
              memory: 16Mi

            limits:
              cpu: 100m
              memory: 64Mi

          volumeMounts:
            - name: temporary-files
              mountPath: /tmp

      volumes:
        - name: temporary-files
          emptyDir: {}
