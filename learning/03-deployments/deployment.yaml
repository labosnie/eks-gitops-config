apiVersion: apps/v1
kind: Deployment

metadata:
  name: hello-deployment
  namespace: incident-platform

  labels:
    app.kubernetes.io/name: hello
    app.kubernetes.io/part-of: incident-platform
    environment: local

spec:
  # Kubernetes doit maintenir deux Pods disponibles.
  replicas: 2

  selector:
    matchLabels:
      app.kubernetes.io/name: hello
      app.kubernetes.io/instance: hello-local

  strategy:
    type: RollingUpdate

    rollingUpdate:
      # Aucun ancien Pod ne doit être indisponible
      # avant qu'un nouveau Pod soit prêt.
      maxUnavailable: 0

      # Un Pod supplémentaire peut être créé temporairement.
      maxSurge: 1

  template:
    metadata:
      labels:
        app.kubernetes.io/name: hello
        app.kubernetes.io/instance: hello-local
        app.kubernetes.io/part-of: incident-platform
        environment: local

    spec:
      automountServiceAccountToken: false

      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: web
          image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          imagePullPolicy: IfNotPresent

          command:
            - sh
            - -c
            - |
              printf 'Bonjour depuis le Pod : %s\n' "$(hostname)" > /tmp/index.html
              httpd -f -p 8080 -h /tmp

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

            capabilities:
              drop:
                - ALL

          readinessProbe:
            httpGet:
              path: /
              port: http

            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: http

            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3

          resources:
            requests:
              cpu: 10m
              memory: 16Mi

            limits:
              cpu: 100m
              memory: 64Mi

          volumeMounts:
            - name: temporary-files
              mountPath: /tmp

      volumes:
        - name: temporary-files
          emptyDir: {}
